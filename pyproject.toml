[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
  \.git
  | \.venv
  | venv
  | fresh_clone_verify
  | studio/workspaces
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["studio/workspaces", ".venv", "venv", "fresh_clone_verify"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
exclude = ["studio/workspaces"]
