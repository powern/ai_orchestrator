name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install flake8 ruff black
      - name: Validate imports
        run: python -m compileall -q -x "studio[/\\]workspaces" agents core studio tests
      - name: Black
        run: black --check .
      - name: Ruff
        run: ruff check .
      - name: Flake8
        run: flake8 .
      - name: Pytest
        run: pytest -q
