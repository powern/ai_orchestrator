name: Repository Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Repository hygiene
        shell: bash
        run: |
          if git ls-files | grep -E '(__pycache__|\.pyc$|studio/workspaces/|\.pytest_cache|\.db$|\.sqlite3?$|\.log$)'; then
            echo "Generated/runtime artifacts are tracked by Git."
            exit 1
          fi
      - name: Validate imports
        run: python -m compileall -q -x "studio[/\\]workspaces" agents core studio tests
      - name: Black
        run: black --check .
      - name: Ruff
        run: ruff check .
      - name: Flake8
        run: flake8 .
      - name: Pytest
        run: pytest -q
